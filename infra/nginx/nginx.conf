events {}

http {
  upstream user_service {
    server user-service:8001;
  }

  upstream kyc_service {
    server kyc-service:8002;
  }

  upstream audit_service {
    server audit-service:8003;
  }

  upstream notification_service {
    server notification-service:8004;
  }

  upstream admin_service {
    server admin-service:8005;
  }

  upstream payment_service {
    server payment-service:8006;
  }

  server {
    listen 80;
    server_name api.test.com;

    # Allow larger request body for image uploads (utility bill, proof of address, identity, selfie)
    client_max_body_size 10M;

    # CORS headers on all responses (needed when frontend on different origin, e.g. localhost:3000)
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID, X-Idempotency-Key" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 3600 always;

    # Preflight: respond to OPTIONS without proxying (CORS headers inherited from server block above)
    if ($request_method = OPTIONS) {
      return 204;
    }

    location /health {
      return 200 "API Gateway is healthy";
    }

    # ---------- AUTH SERVICE ----------
    location = /auth {
      internal;
      proxy_pass http://user_service/auth/validate;
      proxy_set_header Content-Length "";
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header Authorization $http_authorization;
    }

    # ---------- USERS ----------
    location /v1/users/ {
      auth_request /auth;

      proxy_pass http://user_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ---------- ADMIN (X-Admin-Key required; no JWT) ----------
    # KYC admin: full KYC for user + decrypted image download (more specific first)
    location ~ ^/v1/admin/users/[^/]+/kyc(/.*)?$ {
      rewrite ^/v1(.*) $1 break;
      proxy_pass http://kyc_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Admin-Key $http_x_admin_key;
    }
    # User admin: list users, single user
    location /v1/admin/ {
      rewrite ^/v1(.*) $1 break;
      proxy_pass http://user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Admin-Key $http_x_admin_key;
    }

    # ---------- ADMIN PORTAL AUTH (login, change-password, me, create admin) ----------
    location /v1/admin-portal/ {
      rewrite ^/v1/admin-portal(.*) $1 break;
      proxy_pass http://admin_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
    }

    # ---------- KYC ----------
    location /v1/kyc/ {
      auth_request /auth;

      proxy_pass http://kyc_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ---------- AUDIT ----------
    location /v1/audit/ {
      auth_request /auth;

      proxy_pass http://audit_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ---------- PAYMENT (transfers; user JWT required) ----------
    location /v1/payment/ {
      auth_request /auth;

      rewrite ^/v1/payment/(.*) /$1 break;
      proxy_pass http://payment_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Idempotency-Key $http_x_idempotency_key;
    }

    # ---------- NOTIFICATION (e.g. health) ----------
    location /v1/notification/ {
      rewrite ^/v1/notification/(.*) /$1 break;
      proxy_pass http://notification_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
