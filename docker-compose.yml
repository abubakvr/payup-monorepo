services:
  # Postgres
  payup-postgres2:
    image: postgres:16
    container_name: payup-postgres2
    env_file:
      - infra/postgres/postgres.env
    environment:
      USER_DB_PASSWORD: ${USER_DB_PASSWORD}
      KYC_DB_PASSWORD: ${KYC_DB_PASSWORD}
      AUDIT_DB_PASSWORD: ${AUDIT_DB_PASSWORD}
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - payup-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:8-alpine
    container_name: payup-redis
    command: ["redis-server", "--save", "", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - payup-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  audit-migrate:
    image: migrate/migrate:v4.16.0
    env_file:
      - .env
    entrypoint: ["sh", "-c"]
    command:
      - "migrate -path /migrations -database \"postgres://$$AUDIT_DB_USER:$$AUDIT_DB_PASSWORD@$$AUDIT_DB_HOST:$$AUDIT_DB_PORT/$$AUDIT_DB_NAME?sslmode=$$AUDIT_DB_SSLMODE\" up"
    volumes:
      - ./services/audit/migrations:/migrations
    networks:
      - payup-internal
    depends_on:
      payup-postgres2:
        condition: service_healthy

  audit-service:
    build:
      context: .
      dockerfile: services/audit/Dockerfile
    environment:
      KAFKA_BROKER: redpanda:9092
      AUDIT_DATABASE_URL: ${AUDIT_DATABASE_URL}
    networks:
      - payup-internal
    depends_on:
      redpanda:
        condition: service_healthy
      audit-migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./services/audit

  # Migrate services
  user-migrate:
    image: migrate/migrate:v4.16.0
    env_file:
      - .env
    entrypoint: ["sh", "-c"]
    command:
      - "migrate -path /migrations -database \"postgres://$$USER_DB_USER:$$USER_DB_PASSWORD@$$USER_DB_HOST:$$USER_DB_PORT/$$USER_DB_NAME?sslmode=$$USER_DB_SSLMODE\" up"
    volumes:
      - ./services/user/migrations:/migrations
    networks:
      - payup-internal
    depends_on:
      payup-postgres2:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    environment:
      KAFKA_BROKER: redpanda:9092
      EMAIL_VERIFICATION_BASE_URL: ${EMAIL_VERIFICATION_BASE_URL:-}
      PASSWORD_RESET_BASE_URL: ${PASSWORD_RESET_BASE_URL:-}
      REDIS_ADDR: redis:6379
      USER_EXISTS_CACHE_TTL_SECONDS: ${USER_EXISTS_CACHE_TTL_SECONDS:-900}
    env_file:
      - .env
    networks:
      - payup-internal
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./services/user

  kyc-migrate:
    image: migrate/migrate:v4.16.0
    env_file:
      - .env
    entrypoint: ["sh", "-c"]
    command:
      - "migrate -path /migrations -database \"postgres://$$KYC_DB_USER:$$KYC_DB_PASSWORD@$$KYC_DB_HOST:$$KYC_DB_PORT/$$KYC_DB_NAME?sslmode=$$KYC_DB_SSLMODE\" up"
    volumes:
      - ./services/kyc/migrations:/migrations
    networks:
      - payup-internal
    depends_on:
      payup-postgres2:
        condition: service_healthy

  # Existing services
  kyc-service:
    build:
      context: .
      dockerfile: services/kyc/Dockerfile
    env_file:
      - .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-redpanda:9092}
      USER_SERVICE_GRPC_ADDR: user-service:9001
    networks:
      - payup-internal
    depends_on:
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      kyc-migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./services/kyc

  # Create Kafka topic(s) before app services start
  kafka-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "rpk topic create user-events --brokers redpanda:9092 2>/dev/null || true
        rpk topic create audit-events --brokers redpanda:9092 2>/dev/null || true
        rpk topic create notification-events --brokers redpanda:9092 2>/dev/null || true
        rpk topic create wallet-events --brokers redpanda:9092 2>/dev/null || true"
    networks:
      - payup-internal
    depends_on:
      redpanda:
        condition: service_healthy

  # Kafka/Redpanda (log level warn to avoid flooding; use 'info' or 'debug' if needed)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: redpanda
    command:
      - start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --default-log-level=warn
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    networks:
      - payup-internal
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  notification-service:
    build: ./services/notification
    environment:
      KAFKA_BROKER: redpanda:9092
      NOTIFICATION_SERVICE_PORT: "8004"
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-noreply@example.com}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME:-PayUp}
      TERMII_API_KEY: ${TERMII_API_KEY:-}
      TERMII_SENDER_ID: ${TERMII_SENDER_ID:-PayUp}
      TERMII_BASE_URL: ${TERMII_BASE_URL:-https://api.termii.com}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
    networks:
      - payup-internal
    depends_on:
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./services/notification

  # Ensures admin_db and admin_service exist (idempotent). Needed when Postgres volume
  # was created before admin was added to init.sql, so init ran only once and skipped admin.
  admin-db-ensure:
    image: postgres:16
    environment:
      PGHOST: payup-postgres2
      PGUSER: postgres
      PGPASSWORD: postgres
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD}
    volumes:
      - ./infra/postgres/create-admin-role.sql:/create-admin-role.sql:ro
    command: ["sh", "-c", "psql -v ON_ERROR_STOP=0 -v admin_password=\"$ADMIN_DB_PASSWORD\" -f /create-admin-role.sql || true"]
    networks:
      - payup-internal
    depends_on:
      payup-postgres2:
        condition: service_healthy
    restart: "no"

  admin-migrate:
    image: migrate/migrate:v4.16.0
    env_file:
      - .env
    entrypoint: ["sh", "-c"]
    command:
      - "migrate -path /migrations -database \"postgres://$$ADMIN_DB_USER:$$ADMIN_DB_PASSWORD@$$ADMIN_DB_HOST:$$ADMIN_DB_PORT/$$ADMIN_DB_NAME?sslmode=$$ADMIN_DB_SSLMODE\" up"
    volumes:
      - ./services/admin/migrations:/migrations
    networks:
      - payup-internal
    depends_on:
      admin-db-ensure:
        condition: service_completed_successfully

  admin-service:
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    env_file:
      - .env
    environment:
      ADMIN_SERVICE_PORT: "8005"
      ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-${JWT_SECRET}}
      # Bootstrap super admin for admin portal
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_BOOTSTRAP_FIRST_NAME: ${ADMIN_BOOTSTRAP_FIRST_NAME}
      ADMIN_BOOTSTRAP_LAST_NAME: ${ADMIN_BOOTSTRAP_LAST_NAME}
      USER_SERVICE_GRPC_ADDR: user-service:9001
      KYC_SERVICE_GRPC_ADDR: kyc-service:9002
      AUDIT_SERVICE_GRPC_ADDR: audit-service:9003
      KAFKA_BROKER: ${KAFKA_BROKER:-redpanda:9092}
      ADMIN_PORTAL_URL: ${ADMIN_PORTAL_URL:-}
    networks:
      - payup-internal
    depends_on:
      payup-postgres2:
        condition: service_healthy
      admin-migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./services/admin

  payment-db-ensure:
    image: postgres:16
    environment:
      PGHOST: payup-postgres2
      PGUSER: postgres
      PGPASSWORD: postgres
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
    volumes:
      - ./infra/postgres/create-payment-role.sql:/create-payment-role.sql:ro
    command: ["sh", "-c", "psql -v ON_ERROR_STOP=0 -v payment_password=\"$PAYMENT_DB_PASSWORD\" -f /create-payment-role.sql || true"]
    networks:
      - payup-internal
    depends_on:
      payup-postgres2:
        condition: service_healthy
    restart: "no"

  payment-migrate:
    image: migrate/migrate:v4.16.0
    env_file:
      - .env
    entrypoint: ["sh", "-c"]
    command:
      - "migrate -path /migrations -database \"postgres://$$PAYMENT_DB_USER:$$PAYMENT_DB_PASSWORD@$$PAYMENT_DB_HOST:$$PAYMENT_DB_PORT/$$PAYMENT_DB_NAME?sslmode=$$PAYMENT_DB_SSLMODE\" up"
    volumes:
      - ./services/payment/migrations:/migrations
    networks:
      - payup-internal
    depends_on:
      payment-db-ensure:
        condition: service_completed_successfully

  payment-service:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    env_file:
      - .env
    environment:
      PAYMENT_SERVICE_PORT: "8006"
      PAYMENT_GRPC_PORT: "9004"
      PAYMENT_DATABASE_URL: ${PAYMENT_DATABASE_URL}
      KAFKA_BROKER: ${KAFKA_BROKER:-redpanda:9092}
      KYC_SERVICE_GRPC_ADDR: kyc-service:9002
      USER_SERVICE_GRPC_ADDR: user-service:9001
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - payup-internal
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      payment-migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./services/payment

  api-gateway:
    image: nginx:alpine
    container_name: payup-api-gateway
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    networks:
      - payup-internal
    depends_on:
      - user-service
      - kyc-service
      - audit-service
      - notification-service
      - admin-service
      - payment-service

volumes:
  redpanda_data:
  redis_data:
  pgdata:

networks:
  payup-internal:
    driver: bridge
    # internal: true