syntax = "proto3";

package audit;

option go_package = "github.com/abubakvr/payup-backend/proto/audit;auditpb";

service AuditService {
  rpc GetUserAudits (UserAuditRequest) returns (AuditResponse);
  rpc ListAllAudits (ListAllAuditsRequest) returns (AuditResponse);
}

message UserAuditRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListAllAuditsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message AuditLog {
  string service = 1;
  string user_id = 2;
  string action = 3;
  string entity = 4;
  string entity_id = 5;
  string metadata_json = 6;
  string created_at = 7;
}

message AuditResponse {
  repeated AuditLog logs = 1;
  int64 total = 2;
}
