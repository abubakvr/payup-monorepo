syntax = "proto3";

package kyc;

option go_package = "github.com/abubakvr/payup-backend/proto/kyc;kycpb";

service KYCService {
    rpc GetKYCStatus (GetKYCStatusRequest) returns (GetKYCStatusResponse);
    // GetFullKYCForAdmin returns full KYC for a user as JSON (AdminKYCResponse). Used by Admin service.
    rpc GetFullKYCForAdmin (GetFullKYCForAdminRequest) returns (GetFullKYCForAdminResponse);
    // CountProfiles returns the number of KYC profiles, optionally filtered by status and/or kyc_level. Used by Admin kyc-list total.
    rpc CountProfiles (CountProfilesRequest) returns (CountProfilesResponse);
}

message GetKYCStatusRequest {
    string user_id = 1;
}

message GetKYCStatusResponse {
    string status = 1;
}

message GetFullKYCForAdminRequest {
    string user_id = 1;
}

message GetFullKYCForAdminResponse {
    bool found = 1;
    string json_payload = 2;  // AdminKYCResponse as JSON when found
}

message CountProfilesRequest {
    string status = 1;        // optional filter by overall_status (e.g. approved, pending_review, in_progress)
    optional int32 kyc_level = 2;  // optional filter by kyc_level
}

message CountProfilesResponse {
    int64 count = 1;
}